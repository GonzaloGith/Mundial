<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 - Posiciones Oficiales FIFA</title>
    <style>
        :root {
            --primary: #001f3f;
            --secondary: #0074d9;
            --bg: #f4f6f9;
            --text: #333333;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow-x: hidden;
        }
        header { 
            background: var(--primary); 
            color: white; 
            text-align: center; 
            padding: 1.5rem; 
        }
        main { 
            max-width: 1200px; 
            margin: 1.5rem auto; 
            padding: 0 1rem; 
        }
        /* Contenedor responsivo para el contenido de la FIFA */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 85vh; /* Ajusta la altura de la ventana en pantalla */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            overflow: hidden;
            background: #ffffff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>🏆 SEGUIMIENTO MUNDIAL 2026</h1>
        <p>Datos oficiales conectados directamente desde la plataforma de FIFA</p>
    </header>

    <main>
        <div class="iframe-container">
            <iframe 
                src="https://www.fifa.com/es/tournaments/mens/worldcup/canadamexicousa2026/standings" 
                title="Clasificaciones Oficiales FIFA Mundial 2026">
            </iframe>
        </div>
    </main>

</body>
</html>
