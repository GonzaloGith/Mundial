
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Mundial 2026</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 20px;
    }
    h1, h2 {
      text-align: center;
      color: #333;
    }
    section {
      margin: 20px auto;
      padding: 15px;
      background: #fff;
      border-radius: 8px;
      max-width: 900px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }
    canvas {
      margin: 20px auto;
      display: block;
      max-width: 600px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>Dashboard Mundial 2026</h1>

  <section id="matches">
    <h2>Partidos en vivo</h2>
    <ul id="match-list"></ul>
  </section>

  <section id="standings">
    <h2>Clasificaciones</h2>
    <div id="groups"></div>
  </section>

  <section id="knockout">
    <h2>Próximos cruces</h2>
    <ul id="knockout-list"></ul>
  </section>

  <section id="stats">
    <h2>Estadísticas</h2>
    <canvas id="goalsChart"></canvas>
    <canvas id="cardsChart"></canvas>
    <canvas id="possessionChart"></canvas>
  </section>

  <script>
    async function fetchMatches() {
      try {
        const res = await fetch('https://api.fifa.com/api/v1/calendar/matches');
        const data = await res.json();
        renderMatches(data.Results);
      } catch (err) {
        console.error("Error cargando partidos", err);
      }
    }

    function renderMatches(matches) {
      const list = document.getElementById('match-list');
      list.innerHTML = '';
      matches.slice(0, 10).forEach(m => {
        list.innerHTML += `<li>${m.HomeTeam.ShortName} ${m.HomeScore} - ${m.AwayScore} ${m.AwayTeam.ShortName}</li>`;
      });
    }

    async function fetchStandings() {
      try {
        const res = await fetch('https://api.fifa.com/api/v1/standings');
        const data = await res.json();
        renderStandings(data.Groups);
        calculateKnockout(data.Groups);
      } catch (err) {
        console.error("Error cargando clasificaciones", err);
      }
    }

    function renderStandings(groups) {
      const container = document.getElementById('groups');
      container.innerHTML = '';
      groups.forEach(g => {
        let html = `<h3>${g.GroupName}</h3><ul>`;
        g.Teams.forEach(t => {
          html += `<li>${t.TeamName} - ${t.Points} pts</li>`;
        });
        html += '</ul>';
        container.innerHTML += html;
      });

      // Renderizar gráficos con datos del primer grupo
      renderGoalsChart(groups[0].Teams);
      renderCardsChart(groups[0].Teams);
      renderPossessionChart(groups[0].Teams);
    }

    function calculateKnockout(groups) {
      const list = document.getElementById('knockout-list');
      list.innerHTML = '';
      // Ejemplo: Grupo A 1° vs Grupo B 2°
      list.innerHTML += `<li>${groups[0].Teams[0].TeamName} vs ${groups[1].Teams[1].TeamName}</li>`;
    }

    function renderGoalsChart(teams) {
      const ctx = document.getElementById('goalsChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: teams.map(t => t.TeamName),
          datasets: [{
            label: 'Goles a favor',
            data: teams.map(t => t.GoalsFor),
            backgroundColor: 'rgba(54, 162, 235, 0.6)'
          }]
        }
      });
    }

    function renderCardsChart(teams) {
      const ctx = document.getElementById('cardsChart').getContext('2d');
      new Chart(ctx, {
        type: 'pie',
        data: {
          labels: teams.map(t => t.TeamName),
          datasets: [{
            label: 'Tarjetas amarillas',
            data: teams.map(t => t.YellowCards),
            backgroundColor: ['#f39c12','#e74c3c','#2ecc71','#3498db']
          }]
        }
      });
    }

    function renderPossessionChart(teams) {
      const ctx = document.getElementById('possessionChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: teams.map(t => t.TeamName),
          datasets: [{
            label: 'Posesión (%)',
            data: teams.map(t => t.Possession),
            borderColor: 'rgba(255, 99, 132, 1)',
            fill: false
          }]
        }
      });
    }

    setInterval(() => {
      fetchMatches();
      fetchStandings();
    }, 60000);

    fetchMatches();
    fetchStandings();
  </script>
</body>
</html>
